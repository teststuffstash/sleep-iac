# snore-recorder's app-owned Garage resources (ADR-004 per-app-repo): ArgoCD reconciles the
# Crossplane Workspace from THIS repo (sleep-iac), path snore-recorder/ — moved out of the
# snore-recorder repo's infra/. Wave 5 — after provider-terraform + ProviderConfig
# (crossplane-providers, wave 4) are ready. The Workspace creates the sleep-snore bucket + write
# key; the key is published to Infisical (see the module's infisical_secret resources).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snore-recorder
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: sleep
  source:
    repoURL: https://github.com/teststuffstash/sleep-iac.git
    targetRevision: master
    path: snore-recorder
    directory: { recurse: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: snore-recorder
  # namespace is platform-precreated (CreateNamespace omitted → false).
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
