# sleep-tracking app-owned Garage resources (ADR-004 per-app-repo): the Crossplane Workspace
# (adopts the buckets/keys via import, deletionPolicy Orphan) + the ESO ExternalSecrets that
# deliver the ingester's Garage keys and the ghcr registry pull secret. Source is THIS repo
# (sleep-iac), path sleep-tracking/ — the CRs used to live in the sleep-tracking repo's infra/.
# Part of the **sleep** app-of-apps; project: sleep (tenancy boundary). Depends on platform being
# up (ESO operator + ClusterSecretStore + Crossplane provider-terraform) — ArgoCD retries until
# those exist. The path has a kustomization.yaml → ArgoCD renders it with kustomize: the three infra
# CRs + the Grafana dashboard ConfigMap (configMapGenerator). agent/ is excluded (not a resource).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sleep-tracking
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: sleep
  source:
    repoURL: https://github.com/teststuffstash/sleep-iac.git
    targetRevision: master
    path: sleep-tracking
  destination:
    server: https://kubernetes.default.svc
    namespace: sleep-tracking
  # namespace is platform-precreated (CreateNamespace omitted → false); the sleep AppProject
  # allowlists it as a destination but does not permit the tenant to create namespaces.
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 10
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
