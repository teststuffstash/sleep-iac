# Deliver the ingester's Garage keys to the CronJob via ESO (homelab ADR-062). The values
# live in Infisical (homelab/prod, SLEEP_* — published from the Workspace-adopted keys);
# ESO writes them into the `sleep-ingester-credentials` Secret the chart consumes
# (envFrom, secret.existingName). Replaces the old SOPS/manual secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sleep-ingester-credentials
  namespace: sleep-tracking
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sleep-ingester-credentials
    creationPolicy: Owner
  data:
    - secretKey: S3_ACCESS_KEY_ID       # read-only ingester key (sleep-band + sleep-snore)
      remoteRef: { key: SLEEP_S3_ACCESS_KEY_ID }
    - secretKey: S3_SECRET_KEY
      remoteRef: { key: SLEEP_S3_SECRET_KEY }
    - secretKey: STORE_S3_ACCESS_KEY_ID  # read-write key for the sleep-db SQLite store
      remoteRef: { key: SLEEP_STORE_S3_ACCESS_KEY_ID }
    - secretKey: STORE_S3_SECRET_KEY
      remoteRef: { key: SLEEP_STORE_S3_SECRET_KEY }
---
# Registry pull secret for the ingester image (the ghcr.io package is PRIVATE). ghcr is the
# canonical registry now — CI (.github/workflows/build-image.yaml) pushes
# ghcr.io/teststuffstash/sleep-ingester. ESO builds a dockerconfigjson from a GitHub read:packages
# token in Infisical, so the chart's imagePullSecrets can pull without a manual secret.
# Prereq: add SLEEP_GHCR_PULL_TOKEN to Infisical homelab/prod — a **classic** GitHub PAT with the
# read:packages scope (fine-grained PATs CANNOT access Packages/ghcr; classic only). The username is
# the GitHub account that owns the token (ghcr ignores it as long as the token is valid). Replaces
# the old Forgejo SLEEP_FORGEJO_REGISTRY_TOKEN path.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sleep-ingester-registry
  namespace: sleep-tracking
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sleep-ingester-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"teststuffstash","password":"{{ .token }}","auth":"{{ printf "teststuffstash:%s" .token | b64enc }}"}}}
  data:
    - secretKey: token
      remoteRef: { key: SLEEP_GHCR_PULL_TOKEN }
