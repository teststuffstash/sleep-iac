# Per-project git token for the coding agent (homelab ADR-081, docs/agents/ "Identity & secrets").
# A low-privilege "homelab-agents" GitHub App mints a SHORT-LIVED (~1h) installation token, scoped
# to THIS repo and just contents+pull_requests. No hand PAT; the App private key is the only
# long-lived secret (in Infisical). The agent pod consumes the token as GH_TOKEN to clone the
# private repo, push its `agent/…` branch, and `gh pr create` — it can never reach master (branch
# protection + the token's branch+PR-only scope are belt & suspenders).
#
# v1 = the pod holds the 1h token (env). v2/ADR-081 = the egress proxy injects it, never held here.
#
# ⚠️ SCAFFOLD — bootstrap the App + key with homelab scripts/github-agents-app-bootstrap.sh
# (manifest → convert → secrets; one Create + one Install click). That pushes
# AGENTS_GH_APP_PRIVATE_KEY to Infisical and PRINTS the appID/installID — paste those into
# spec.appID/spec.installID below. Apply with kubectl (sleep-tracking/agent/ is NOT in the ArgoCD
# non-recursive sync). The App is installed on SELECTED repos only (least privilege).
---
# 1) App private key: Infisical → a k8s Secret the generator reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agents-github-app
  namespace: sleep-tracking
spec:
  refreshInterval: 1h
  secretStoreRef: { name: infisical, kind: ClusterSecretStore }
  target:
    name: agents-github-app
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # un-escape the literal \n the Infisical CLI introduces (no-op if already real newlines),
        # yielding a byte-exact PEM the GithubAccessToken generator's JWT signer accepts.
        privateKey: '{{ .pem | replace "\\n" "\n" }}'
  data:
    - secretKey: pem
      remoteRef: { key: AGENTS_GH_APP_PRIVATE_KEY }
---
# 2) The generator: mint an installation token scoped to this repo + contents/PR write + issues read.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: agent-git-token-gen
  namespace: sleep-tracking
spec:
  appID: "4150968"          # GitHub App → About → App ID
  installID: "142724430"  # the installation on teststuffstash (App → Install App → URL id)
  auth:
    privateKey:
      secretRef: { name: agents-github-app, key: privateKey }
  permissions:                     # narrower than the App's grant (defense in depth)
    contents: write
    pull_requests: write
    issues: read                   # the fixer recipe MUST `gh issue view <n>` first; 404s without this
  repositories:
    - sleep-tracking               # this token can ONLY touch this repo
---
# 3) Drive the generator → write the token into the Secret the agent pod reads (key: token).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-git-token
  namespace: sleep-tracking
spec:
  refreshInterval: 45m             # token lives ~1h; refresh before expiry
  target: { name: agent-git-token, creationPolicy: Owner }
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: agent-git-token-gen
