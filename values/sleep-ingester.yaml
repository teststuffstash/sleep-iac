# Helm values for the sleep-ingester chart — the deploy config for the sleep stack. Consumed by
# apps/sleep-ingester.yaml via $values.
#
# NOTE: this file sets NO `image:` block on purpose. The image REPOSITORY + PULLPOLICY are chart
# defaults, and the image TAG defaults to the chart appVersion (chart/templates/cronjob.yaml). So the
# deployed image is fully determined by the pinned chart version (apps/sleep-ingester.yaml
# targetRevision) — a deploy bumps ONE number and image versioning never leaks into IaC. See homelab
# docs/sleep-iac.md §"Deploy pipeline". This file only carries how the CronJob runs in this cluster.

# ESO-managed dockerconfigjson (sleep-tracking/externalsecret.yaml: sleep-ingester-registry,
# from Infisical SLEEP_GHCR_PULL_TOKEN). The ghcr package is private, so the pull secret stays.
imagePullSecrets:
  - name: sleep-ingester-registry

schedule: "42 */6 * * *"
cronTimezone: "Europe/Tallinn"

config:
  s3Endpoint: "https://s3.teststuff.net"
  s3Region: "garage"
  tz: "Europe/Tallinn"
  sleepBandBucket: "sleep-band"
  sleepSnoreBucket: "sleep-snore"
  sleepDbBucket: "sleep-db"
  storeUrl: "sqlite:///data/sleep.sqlite" # Postgres at cutover (#42)

# Garage keys delivered by ESO (sleep-tracking/externalsecret.yaml) into this Secret; the chart
# envFroms it.
secret:
  create: false
  existingName: "sleep-ingester-credentials"

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 256Mi }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities: { drop: ["ALL"] }
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
