# Helm values for the sleep-ingester chart — the deploy config for the sleep stack. Consumed by
# apps/sleep-ingester.yaml via $values. The chart itself (templates) is published to ghcr from the
# sleep-tracking repo. Keep image.tag in lockstep with the chart targetRevision in that Application.

image:
  # ghcr.io (PRIVATE package → needs the pull secret below). Canonical registry: CI in the
  # sleep-tracking repo (.github/workflows/build-image.yaml) builds + pushes here.
  repository: ghcr.io/teststuffstash/sleep-ingester
  tag: "0.2.0" # release v0.2.0 (chart + image move together; bump per release)
  pullPolicy: IfNotPresent

# ESO-managed dockerconfigjson (sleep-tracking/externalsecret.yaml: sleep-ingester-registry,
# from Infisical SLEEP_GHCR_PULL_TOKEN).
imagePullSecrets:
  - name: sleep-ingester-registry

schedule: "42 */6 * * *"
cronTimezone: "Europe/Tallinn"

config:
  s3Endpoint: "https://s3.teststuff.net"
  s3Region: "garage"
  tz: "Europe/Tallinn"
  sleepBandBucket: "sleep-band"
  sleepSnoreBucket: "sleep-snore"
  sleepDbBucket: "sleep-db"
  storeUrl: "sqlite:///data/sleep.sqlite" # Postgres at cutover (#42)

# Garage keys delivered by ESO (sleep-tracking/externalsecret.yaml) into this Secret; the chart
# envFroms it.
secret:
  create: false
  existingName: "sleep-ingester-credentials"

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 256Mi }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities: { drop: ["ALL"] }
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
